<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#05070a"/>
  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#05070a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left: Logo large -->
  <g transform="translate(120, 180)">
    <!-- Cat ears large -->
    <polygon points="0,80 40,0 80,80" fill="#00ff66" opacity="0.9"/>
    <polygon points="100,80 140,0 180,80" fill="#00ff66" opacity="0.9"/>
    <polygon points="8,78 40,12 72,78" fill="#00ff66" opacity="0.3"/>
    <polygon points="108,78 140,12 172,78" fill="#00ff66" opacity="0.3"/>
    <!-- Terminal screen -->
    <rect x="-10" y="80" width="200" height="140" rx="12" fill="#090d16" stroke="#00ff66" stroke-width="2"/>
    <text x="6" y="124" font-family="monospace" font-size="22" font-weight="bold" fill="#00ff66">visitor@neko</text>
    <text x="6" y="150" font-family="monospace" font-size="18" fill="#00ccff">:~$ _</text>
  </g>

  <!-- Right: Text content -->
  <text x="400" y="230" font-family="monospace" font-size="52" font-weight="bold" fill="#00ff66">NEKO.OS</text>
  <text x="400" y="285" font-family="monospace" font-size="20" fill="#64748b">v4.0.0 — Developer Portfolio</text>

  <!-- Divider -->
  <line x1="400" y1="310" x2="1080" y2="310" stroke="#00ff66" stroke-width="1" opacity="0.2"/>

  <!-- Stats row -->
  <text x="400" y="360" font-family="monospace" font-size="16" fill="#00ccff">25+ Projects</text>
  <text x="570" y="360" font-family="monospace" font-size="16" fill="#64748b">•</text>
  <text x="590" y="360" font-family="monospace" font-size="16" fill="#bd93f9">Next.js 16 · TypeScript · GSAP</text>

  <!-- Bottom tagline -->
  <text x="400" y="430" font-family="monospace" font-size="18" fill="#e2e8f0" opacity="0.8">Full-Stack Developer · AI Automation · Web Experiences</text>
  <text x="400" y="470" font-family="monospace" font-size="14" fill="#64748b">github.com/nicodolas</text>

  <!-- Scan line decoration -->
  <rect x="0" y="0" width="1200" height="2" fill="#00ff66" opacity="0.15"/>
  <rect x="0" y="628" width="1200" height="2" fill="#00ff66" opacity="0.15"/>
</svg>
