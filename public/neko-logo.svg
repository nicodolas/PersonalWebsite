<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Neko OS Logo: Terminal + Cat ears -->
  <rect width="64" height="64" rx="12" fill="#05070a"/>
  <!-- Cat ears -->
  <polygon points="10,20 18,6 26,20" fill="#00ff66" opacity="0.9"/>
  <polygon points="38,20 46,6 54,20" fill="#00ff66" opacity="0.9"/>
  <!-- Inner ear -->
  <polygon points="12,19 18,9 24,19" fill="#00ff66" opacity="0.35"/>
  <polygon points="40,19 46,9 52,19" fill="#00ff66" opacity="0.35"/>
  <!-- Terminal screen -->
  <rect x="8" y="20" width="48" height="34" rx="4" fill="#090d16" stroke="#00ff66" stroke-width="1.5" opacity="0.9"/>
  <!-- Scan line glow -->
  <rect x="8" y="20" width="48" height="4" rx="2" fill="#00ff66" opacity="0.06"/>
  <!-- Prompt symbol > -->
  <text x="13" y="38" font-family="monospace" font-size="10" font-weight="bold" fill="#00ff66">visitor@neko</text>
  <text x="13" y="48" font-family="monospace" font-size="9" fill="#00ccff">:~$ _</text>
  <!-- Blinking cursor rect -->
  <rect x="39" y="41" width="5" height="8" rx="1" fill="#00ccff" opacity="0.85"/>
</svg>
