name: Generate Neko Data
on:
  schedule:
    - cron: '0 2 * * *'   # Runs at 02:00 UTC daily
  workflow_dispatch: {}  # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub Raw Data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node src/scripts/fetch-raw-data.js

      - name: Run Analyzers Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: node src/scripts/run-analyzers.js

      - name: Run CI Safety Check
        run: node src/scripts/ci-safety-check.js

      - name: Commit and push to data branch
        run: |
          # Configure git identity
          git config user.name "neko-bot"
          git config user.email "bot@nekovibecoder.site"

          # Stage only approved data files
          git add \
            "src/data/generated/**/*.json" \
            "src/data/cache/**/*.json" \
            -- 2>/dev/null || true
          git add src/data/generated/ src/data/cache/ 2>/dev/null || true

          # If nothing changed, exit cleanly — no empty commit/branch
          if git diff --cached --quiet; then
            echo "No data changes detected. Skipping branch creation."
            exit 0
          fi

          # Create a timestamped branch so each run is isolated and never conflicts
          BRANCH="data/auto-update-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          git commit -m "chore: auto-update github dynamic data [skip ci]"

          # Push branch to origin using the workflow token
          git push origin "$BRANCH"

          echo "Pushed data update to branch: $BRANCH"

          # Auto-create PR into main, then enable auto-merge (merges when status checks pass)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-update github dynamic data ($(date -u +%Y-%m-%d))" \
            --body "Automated daily data refresh. Generated by neko-bot." \
            --label "data-update" 2>/dev/null || true

          gh pr merge "$BRANCH" \
            --squash \
            --auto \
            --delete-branch \
            --subject "chore: auto-update github dynamic data ($(date -u +%Y-%m-%d))"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
