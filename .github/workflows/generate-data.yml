name: Generate Neko Data
on:
  schedule:
    - cron: '0 2 * * *'   # Runs at 02:00 UTC daily
  workflow_dispatch: {}  # Allows manual triggering

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub Raw Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/scripts/fetch-raw-data.js

      - name: Run Analyzers Pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: node src/scripts/run-analyzers.js

      - name: Run CI Safety Check
        run: node src/scripts/ci-safety-check.js

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update github dynamic data [skip ci]"
          file_pattern: |
            src/data/generated/**/*.json
            src/data/cache/**/*.json
          commit_user_name: "neko-bot"
          commit_user_email: "bot@nekovibecoder.site"
