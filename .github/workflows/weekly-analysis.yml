name: Weekly Era and Trend Analysis
on:
  schedule:
    - cron: '0 4 * * 0'   # Runs at 04:00 UTC every Sunday
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch GitHub Raw Data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node src/scripts/fetch-raw-data.js

      - name: Run Analyzers (Forced AI Regeneration)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          rm -f src/data/cache/ai-cache.json
          node src/scripts/run-analyzers.js

      - name: Run CI Safety Check
        run: node src/scripts/ci-safety-check.js

      - name: Commit and push to data branch
        run: |
          # Configure git identity
          git config user.name "neko-bot"
          git config user.email "bot@nekovibecoder.site"

          # Stage only approved data files
          git add src/data/generated/ src/data/cache/ 2>/dev/null || true

          # If nothing changed, exit cleanly — no empty commit/branch
          if git diff --cached --quiet; then
            echo "No data changes detected. Skipping branch creation."
            exit 0
          fi

          # Create a timestamped branch so each run is isolated and never conflicts
          BRANCH="data/weekly-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          git commit -m "chore: weekly deep analysis and narrative update"

          # Push branch to origin using the workflow token
          git push origin "$BRANCH"

          echo "Pushed weekly data update to branch: $BRANCH"

          # Auto-create PR và lấy URL về, sau đó enable auto-merge ngay trên PR đó
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: weekly deep analysis and narrative update ($(date -u +%Y-%m-%d))" \
            --body "Automated weekly data refresh with forced AI regeneration. Generated by neko-bot." \
            --label "bot")

          echo "PR created: $PR_URL"

          gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch \
            --subject "chore: weekly deep analysis and narrative update ($(date -u +%Y-%m-%d))"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
