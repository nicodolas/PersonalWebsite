name: Validate Data Schemas
on:
  push:
    paths:
      - 'src/data/**/*.json'
  pull_request:
    paths:
      - 'src/data/**/*.json'
  workflow_dispatch: {}

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON Schemas
        run: node src/scripts/validate-json.js
